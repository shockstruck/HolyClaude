name: HolyClaude — Build & Push to GHCR

run-name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.workflow }}

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/holyclaude

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      max-parallel: 1
      matrix:
        variant: [slim, full]

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          docker system prune -af
          df -h

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.variant == 'full' }}
            type=raw,value=slim,enable=${{ matrix.variant == 'slim' }}
            type=semver,pattern={{version}},enable=${{ matrix.variant == 'full' }}
            type=semver,pattern={{version}}-slim,enable=${{ matrix.variant == 'slim' }}

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
