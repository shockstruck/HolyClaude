# ==============================================================================
# HolyClaude — Quick Start
# Just run: docker compose up -d
# Then open: http://localhost:3001
# ==============================================================================

services:
  holyclaude:
    image: ghcr.io/shockstruck/holyclaude:latest
    container_name: holyclaude
    hostname: holyclaude
    restart: unless-stopped
    shm_size: 2g
    network_mode: bridge
    cap_add:
      - SYS_ADMIN      # Required for Chromium sandboxing
      - SYS_PTRACE      # Required for debugging
    security_opt:
      - seccomp=unconfined  # Required for Chromium in Docker
    ports:
      - "127.0.0.1:3001:3001"     # CloudCLI web UI, localhost only
    volumes:
      - ./data/claude:/home/claude/.claude
      - ./workspace:/workspace
    environment:
      - TZ=UTC          # Change to your timezone
